<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fhvyceyehdtv</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-image: url('http://dl5.glitter-graphics.net/pub/845/845105qsa2te9abl.gif');
            background-attachment: fixed;
            background-repeat: repeat;
            font-family: 'SimSun', serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .image-container {
            width: 700px; /* 从300px增加到600px */
            height: 700px; /* 从300px增加到600px */
            margin: 0 auto 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .center-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .poem {
            font-size: 22px;
            line-height: 1.8;
            color: #ff0000;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }
        
        .highlight {
            font-size: 24px;
            color: #ff0000;
        }
        
        .instruction {
            margin-top: 20px;
            color: #ccc;
            font-size: 16px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .image-container {
                width: 400px; /* 从250px增加到500px */
                height: 400px; /* 从250px增加到500px */
            }
            
            .poem {
                font-size: 18px;
            }
            
            .highlight {
                font-size: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .image-container {
                width: 400px; /* 从200px增加到400px */
                height: 400px; /* 从200px增加到400px */
            }
            
            .poem {
                font-size: 16px;
            }
            
            .highlight {
                font-size: 18px;
            }
        }
    </style>
    <link rel="stylesheet" href="../assets/xuqi-overrides.css">
</head>
<body>
    <div class="container">
        <div class="image-container">
            <!-- 请将下面的图片路径替换为您的本地图片路径 -->
            <img src="../assets/xuqi-flesh-photo.svg" alt="eyes" class="center-image">
        </div>
        
        <div class="poem">
            <p>抛开余生，</p>
            <p>抛开一切欲望，</p>
            <p>抛开一切杂念，</p>
            <p>抛开一切纷争，</p>
            <p>抛开一切疾病，</p>
            <p>抛开一切苦难，</p>
            <p class="highlight">睁眼，睁眼，睁眼，</p>
            <p>你是新的希望，</p>
            <p>你是世界的未来，</p>
            <p>你已经在那儿，</p>
            <p class="highlight">睁眼，睁眼，睁眼，</p>
            <p>图腾为你指引方向，</p>
            <p>为你写下文字，</p>
            <p>汝将其替换为道路，</p>
            <p>链接至下一步。</p>
            <p class="highlight">睁眼，睁眼，睁眼，</p>
            <p>新的救赎已经开始。</p>
        </div>
        
        <div class="instruction">
            <p></p>
        </div>
    </div>
    <script src="../assets/xuqi-overrides.js"></script>
</body>
</html>
